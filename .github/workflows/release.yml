name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  linux:
    name: Linux artifacts (tarball / deb / AppImage)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME}"
          fi
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm dpkg-dev zip file desktop-file-utils

      - name: Build binary
        run: |
          make clean
          make

      - name: Run smoke tests
        run: |
          if [ -f tests/run_tests.sh ]; then bash tests/run_tests.sh || true; fi

      - name: Build tarball
        run: |
          VERSION=${{ steps.ver.outputs.version }} make dist

      - name: Build .deb
        run: |
          APP_VERSION=${{ steps.ver.outputs.version }} make deb

      - name: Build AppImage
        run: |
          APP_VERSION=${{ steps.ver.outputs.version }} make appimage

      - name: List artifacts
        run: |
          ls -la dist/ || true
          ls -la asm-terminal-*.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.deb
            asm-terminal-*.AppImage
          if-no-files-found: warn

  windows:
    name: Windows artifacts (exe + NSIS setup.exe)
    runs-on: windows-latest
    outputs:
      version: ${{ needs.linux.outputs.version }}
    needs: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM (chocolatey)
        shell: pwsh
        run: |
          choco install -y nasm --no-progress
          # choco installs to "C:\Program Files\NASM" on GH runners
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\NASM"

      - name: Install NSIS (chocolatey)
        shell: pwsh
        run: |
          choco install -y nsis --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Verify toolchain
        shell: pwsh
        run: |
          nasm -v
          & "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Build terminal.exe
        shell: cmd
        run: |
          call build.bat

      - name: Stage Windows zip payload
        shell: pwsh
        run: |
          $v    = "${{ needs.linux.outputs.version }}"
          $name = "asm-terminal-$v-windows-x86_64"
          $dst  = "dist\$name"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Copy-Item terminal.exe                                     "$dst\"
          Copy-Item packaging\windows\install.bat                    "$dst\"
          Copy-Item packaging\windows\install.ps1                    "$dst\"
          Copy-Item packaging\windows\uninstall.bat                  "$dst\"
          if (Test-Path packaging\windows\asm-terminal.ico) {
              Copy-Item packaging\windows\asm-terminal.ico          "$dst\"
          }
          Copy-Item README.md                                        "$dst\"
          Copy-Item packaging\windows\README.md                      "$dst\INSTALL.md"
          Copy-Item packaging\windows\SIGNING.md                     "$dst\SIGNING.md"
          Compress-Archive -Path "$dst\*" -DestinationPath "dist\$name.zip" -Force
          Get-ChildItem dist

      - name: Build NSIS setup.exe
        shell: pwsh
        run: |
          $v = "${{ needs.linux.outputs.version }}"
          # NSIS File directives look relative to the .nsi location.
          Copy-Item terminal.exe                 packaging\windows\terminal.exe -Force
          Push-Location packaging\windows
          try {
              & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=$v installer.nsi
          } finally {
              Pop-Location
          }
          $out = Get-ChildItem packaging\windows\asm-terminal-*-setup.exe | Select-Object -First 1
          if ($out) {
              Move-Item $out.FullName dist\ -Force
              Write-Host "Built: $(Join-Path dist $out.Name)"
          } else {
              Write-Error "makensis did not produce a setup.exe"
          }

      # ---- OPTIONAL signing steps (run only when the corresponding secret exists) ----

      # ---- Optional code-signing (runs only when a PFX secret is set) --------
      # For Azure Trusted Signing, use AzureSignTool.exe externally or see
      # packaging/windows/SIGNING.md. This workflow supports the simplest path:
      # a base64-encoded PFX stored in CODE_SIGN_PFX_BASE64.
      - name: Sign setup.exe with PFX (if secret is set)
        if: ${{ secrets.CODE_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          CODE_SIGN_PFX_PASSWORD: ${{ secrets.CODE_SIGN_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $signtool) { throw 'signtool.exe not found' }
          Get-ChildItem dist\*setup.exe | ForEach-Object {
              & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:CODE_SIGN_PFX_PASSWORD $_.FullName
              if ($LASTEXITCODE -ne 0) { throw "signtool exited $LASTEXITCODE" }
              & $signtool verify /pa /all $_.FullName
          }
          Remove-Item $pfxPath -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/asm-terminal-*-windows-x86_64.zip
            dist/asm-terminal-*-setup.exe
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p final
          find release-assets -type f -exec cp -v {} final/ \;
          ls -la final/

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              t="${{ github.event.inputs.version }}"
          else
              t="${GITHUB_REF_NAME}"
          fi
          [ "${t:0:1}" = "v" ] || t="v$t"
          echo "tag=$t" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: final/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
