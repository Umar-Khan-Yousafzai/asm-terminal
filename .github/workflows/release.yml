name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  linux:
    name: Linux artifacts (tarball / deb / AppImage)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME}"
          fi
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm dpkg-dev zip file desktop-file-utils

      - name: Build binary
        run: |
          make clean
          make

      - name: Run smoke tests
        run: |
          if [ -f tests/run_tests.sh ]; then bash tests/run_tests.sh || true; fi

      - name: Build tarball
        run: |
          VERSION=${{ steps.ver.outputs.version }} make dist

      - name: Build .deb
        run: |
          APP_VERSION=${{ steps.ver.outputs.version }} make deb

      - name: Build AppImage
        run: |
          APP_VERSION=${{ steps.ver.outputs.version }} make appimage

      - name: List artifacts
        run: |
          ls -la dist/ || true
          ls -la asm-terminal-*.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.deb
            asm-terminal-*.AppImage
          if-no-files-found: warn

  windows:
    name: Windows artifacts (exe + installer)
    runs-on: windows-latest
    outputs:
      version: ${{ needs.linux.outputs.version }}
    needs: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: |
          choco install -y nasm
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Install NSIS
        run: |
          choco install -y nsis
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build terminal.exe
        shell: cmd
        run: |
          call build.bat

      - name: Stage Windows zip
        shell: pwsh
        run: |
          $v = "${{ needs.linux.outputs.version }}"
          $name = "asm-terminal-$v-windows-x86_64"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item terminal.exe                            "dist/$name/"
          Copy-Item packaging/windows/install.bat           "dist/$name/"
          Copy-Item packaging/windows/uninstall.bat         "dist/$name/"
          if (Test-Path packaging/windows/asm-terminal.ico) {
            Copy-Item packaging/windows/asm-terminal.ico    "dist/$name/"
          }
          Copy-Item README.md                               "dist/$name/"
          Copy-Item packaging/windows/README.md             "dist/$name/INSTALL.md"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $v = "${{ needs.linux.outputs.version }}"
          Copy-Item terminal.exe                          packaging/windows/
          if (Test-Path packaging/windows/asm-terminal.ico) { } else {
            # Placeholder .ico so NSIS script's File line doesn't fail
            [System.IO.File]::WriteAllBytes("packaging/windows/asm-terminal.ico", (,0 * 16))
          }
          Push-Location packaging/windows
          try {
            makensis /DAPP_VERSION=$v installer.nsi
          } finally {
            Pop-Location
          }
          $out = Get-ChildItem packaging/windows/asm-terminal-*-setup.exe | Select-Object -First 1
          if ($out) { Move-Item $out.FullName dist/ }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/asm-terminal-*-windows-x86_64.zip
            dist/asm-terminal-*-setup.exe
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [linux, windows]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p final
          find release-assets -type f -exec cp -v {} final/ \;
          ls -la final/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: final/*
          generate_release_notes: true
          draft: false
          prerelease: false
